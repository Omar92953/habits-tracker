<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Habits">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.json">
<title>The Habits Tracker</title>
<style>
/* ── Reset ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
*{word-break:break-word;overflow-wrap:break-word}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--label);-webkit-font-smoothing:antialiased;-webkit-text-size-adjust:none}
svg{display:block;flex-shrink:0}
button,input{font-family:inherit}

/* ── Apple HIG Design Tokens (dark) ── */
:root{
  --bg:#000;--bg-2:#1c1c1e;--bg-3:#2c2c2e;--bg-4:#3a3a3c;
  --label:#fff;--label-2:rgba(235,235,245,.6);--label-3:rgba(235,235,245,.3);--label-4:rgba(235,235,245,.16);
  --fill:rgba(120,120,128,.36);--fill-2:rgba(120,120,128,.32);--fill-3:rgba(118,118,128,.24);--fill-4:rgba(116,116,128,.18);
  --sep:rgba(84,84,88,.65);--sep-o:#38383a;
  --tint:#ff9f0a;--tint-dim:rgba(255,159,10,.15);
  --green:#32d74b;--red:#ff453a;--pink:#ff375f;--teal:#40cbe0;--yellow:#ffd60a;
  --s1:4px;--s2:8px;--s3:12px;--s4:16px;--s5:20px;--s6:24px;--s7:32px;
  --r-xl:22px;--r-lg:16px;--r-md:12px;--r-sm:8px;--r-pill:999px;
  --sidebar-w:240px;--tf:.12s ease-out;--tb:.2s ease-out;
}

/* ── Layout ── */
#app{height:100%;display:flex;flex-direction:column}
#app-layout{flex:1;display:flex;overflow:hidden}

/* Sidebar */
#sidebar{width:var(--sidebar-w);background:var(--bg-2);border-right:.5px solid var(--sep-o);display:flex;flex-direction:column;padding-top:env(safe-area-inset-top);padding-left:env(safe-area-inset-left);flex-shrink:0}
.sb-top{padding:var(--s5) var(--s4);display:flex;align-items:center;gap:10px;border-bottom:.5px solid var(--sep-o)}
.sb-mark{width:32px;height:32px;background:var(--tint);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0;box-shadow:0 2px 8px rgba(255,159,10,.4)}
.sb-title{font-size:16px;font-weight:700;letter-spacing:-.3px}
.sb-nav{padding:var(--s2);flex:1}
.sb-btn{width:100%;display:flex;align-items:center;gap:10px;padding:9px var(--s3);border-radius:var(--r-md);background:none;border:none;color:var(--label-2);font-size:15px;font-weight:500;cursor:pointer;text-align:left;transition:all var(--tf);-webkit-tap-highlight-color:transparent}
.sb-btn:hover{background:var(--fill-3);color:var(--label)}
.sb-btn.active{background:var(--fill-2);color:var(--tint)}

/* Page content */
#page-content{flex:1;overflow-y:auto;overflow-x:hidden;padding-top:calc(env(safe-area-inset-top) + var(--s5));padding-bottom:calc(61px + env(safe-area-inset-bottom));padding-left:calc(var(--s4) + env(safe-area-inset-left));padding-right:calc(var(--s4) + env(safe-area-inset-right));-webkit-overflow-scrolling:touch}
.page{display:none}.page.active{display:block;animation:pgIn .18s ease-out}
@keyframes pgIn{from{opacity:.5;transform:translateY(6px)}to{opacity:1;transform:none}}

/* Tab bar (HIG 49pt) */
#bottom-nav{display:none;background:rgba(0,0,0,.85);backdrop-filter:blur(40px) saturate(180%);-webkit-backdrop-filter:blur(40px) saturate(180%);border-top:.5px solid var(--sep-o);padding-bottom:env(safe-area-inset-bottom);height:calc(49px + env(safe-area-inset-bottom));position:fixed;bottom:0;left:0;right:0;z-index:100;justify-content:space-around;align-items:flex-start}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding-top:8px;background:none;border:none;color:var(--label-3);cursor:pointer;transition:color var(--tf);-webkit-tap-highlight-color:transparent}
.nav-btn.active{color:var(--tint)}
.nl{font-size:10px;font-weight:500;letter-spacing:.02em}

@media(max-width:767px){#sidebar{display:none!important}#bottom-nav{display:flex}}
@media(min-width:768px){#bottom-nav{display:none}#sidebar{display:flex}#app-layout{flex-direction:row}#page-content{padding-top:var(--s5);padding-bottom:var(--s5)}}
input,select,textarea{font-size:16px!important}

/* ── Login ── */
#login-overlay{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:1000;padding:var(--s6);padding-top:calc(env(safe-area-inset-top) + var(--s6))}
.login-card{width:100%;max-width:340px;display:flex;flex-direction:column;align-items:center;gap:var(--s5)}
.login-mark{width:80px;height:80px;background:var(--tint);border-radius:22px;display:flex;align-items:center;justify-content:center;color:#fff;box-shadow:0 8px 32px rgba(255,159,10,.45),0 2px 8px rgba(0,0,0,.5)}
.login-card h1{font-size:28px;font-weight:700;letter-spacing:-.5px;text-align:center}
.login-card p{color:var(--label-2);text-align:center;font-size:16px}
.login-field{width:100%;background:var(--bg-2);border:none;border-radius:var(--r-md);color:var(--label);padding:14px var(--s4);outline:none;transition:all var(--tf)}
.login-field:focus{box-shadow:0 0 0 3px rgba(255,159,10,.3)}
.btn-cta{width:100%;background:var(--tint);color:#fff;border:none;border-radius:var(--r-md);padding:15px var(--s4);font-size:17px;font-weight:600;cursor:pointer;box-shadow:0 4px 20px rgba(255,159,10,.4);transition:all var(--tf)}
.btn-cta:active{opacity:.85;transform:scale(.98)}

/* ── Page header (HIG large title) ── */
.ph{margin-bottom:var(--s5)}
.ph-title{font-size:34px;font-weight:700;letter-spacing:-.5px;line-height:1.05}
.ph-sub{font-size:15px;color:var(--label-2);margin-top:3px}

/* ── Progress card ── */
.progress-card{display:flex;align-items:center;gap:var(--s4);background:var(--bg-2);border-radius:var(--r-lg);padding:var(--s4) var(--s5);margin-bottom:var(--s5);border:.5px solid var(--sep-o);box-shadow:0 2px 16px rgba(0,0,0,.4)}
.prog-info{flex:1}
.prog-count{font-size:32px;font-weight:700;letter-spacing:-1px;line-height:1}
.prog-label{font-size:14px;color:var(--label-2);margin-top:3px}

/* ── Habit cards (Today) ── */
.habits-list{display:flex;flex-direction:column;gap:10px}
.habit-card{background:var(--bg-2);border-radius:var(--r-lg);border:.5px solid rgba(84,84,88,.4);padding:13px var(--s4);display:flex;align-items:center;gap:var(--s3);cursor:pointer;transition:all var(--tf);-webkit-tap-highlight-color:transparent;position:relative;overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,.3)}
.habit-card:active{transform:scale(.977)}
.h-icon{width:44px;height:44px;display:flex;align-items:center;justify-content:center;border-radius:var(--r-md);flex-shrink:0;transition:all var(--tf)}
.h-info{flex:1;min-width:0}
.h-name{font-size:16px;font-weight:600;letter-spacing:-.15px}
.h-meta{font-size:13px;color:var(--label-3);margin-top:2px}
.streak-pill{display:inline-flex;align-items:center;gap:3px;background:rgba(255,159,10,.15);color:var(--tint);padding:4px 9px;border-radius:var(--r-pill);font-size:12px;font-weight:700;flex-shrink:0}
.check-ring{width:28px;height:28px;border-radius:50%;border:1.8px solid var(--fill);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:transparent;transition:all .22s cubic-bezier(.34,1.56,.64,1)}
.habit-card.done .check-ring{border-color:transparent;color:#fff;transform:scale(1.1)}

/* ── Manage list ── */
.manage-list{display:flex;flex-direction:column;gap:10px}
.manage-item{background:var(--bg-2);border-radius:var(--r-lg);border:.5px solid var(--sep-o);padding:12px var(--s4);display:flex;align-items:center;gap:var(--s3);cursor:pointer;transition:all var(--tf);-webkit-tap-highlight-color:transparent;box-shadow:0 1px 6px rgba(0,0,0,.25)}
.manage-item:active{opacity:.8}
.color-bar{width:4px;height:36px;border-radius:2px;flex-shrink:0}
.m-info{flex:1;min-width:0}
.m-name{font-size:16px;font-weight:600}
.m-meta{font-size:13px;color:var(--label-3);margin-top:2px}
.action-btn{width:34px;height:34px;border-radius:var(--r-sm);background:var(--fill-3);border:none;color:var(--label-2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all var(--tf);-webkit-tap-highlight-color:transparent}
.action-btn.del:active{background:rgba(255,69,58,.18);color:var(--red)}

/* ── FAB ── */
#fab{position:fixed;bottom:calc(60px + env(safe-area-inset-bottom));right:calc(var(--s5) + env(safe-area-inset-right));width:52px;height:52px;border-radius:50%;background:var(--tint);color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(255,159,10,.5),0 2px 8px rgba(0,0,0,.5);transition:all var(--tf);z-index:99}
#fab:active{transform:scale(.91)}
@media(min-width:768px){#fab{bottom:calc(var(--s5) + env(safe-area-inset-bottom))}}

/* ── Calendar ── */
.habit-pills{display:flex;gap:var(--s2);overflow-x:auto;padding-bottom:var(--s2);scrollbar-width:none;-webkit-overflow-scrolling:touch}
.habit-pills::-webkit-scrollbar{display:none}
.h-pill{flex-shrink:0;padding:6px 14px;border-radius:var(--r-pill);border:1.5px solid var(--sep);background:none;color:var(--label-2);font-size:14px;font-weight:500;cursor:pointer;transition:all var(--tf);white-space:nowrap;-webkit-tap-highlight-color:transparent}
.h-pill.active{color:#fff;border-color:transparent}
.period-seg{display:flex;gap:1px;background:var(--fill-3);border-radius:var(--r-sm);padding:2px;margin:var(--s4) 0}
.period-btn{flex:1;padding:7px;border-radius:6px;background:none;border:none;color:var(--label-3);font-size:13px;font-weight:600;cursor:pointer;transition:all var(--tf);-webkit-tap-highlight-color:transparent}
.period-btn.active{background:var(--bg-3);color:var(--label)}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--s4)}
.cal-arrow{width:34px;height:34px;border-radius:var(--r-md);background:var(--fill-3);border:none;color:var(--label);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all var(--tf);-webkit-tap-highlight-color:transparent}
.cal-arrow:active{opacity:.7}
.cal-label{font-size:17px;font-weight:600;letter-spacing:-.2px}
.month-grid{background:var(--bg-2);border-radius:var(--r-lg);border:.5px solid var(--sep-o);overflow:hidden;box-shadow:0 1px 8px rgba(0,0,0,.3)}
.month-wdays{display:grid;grid-template-columns:repeat(7,1fr);padding:var(--s3) var(--s2) var(--s2)}
.wday{text-align:center;font-size:11px;font-weight:600;color:var(--label-3);text-transform:uppercase;letter-spacing:.04em}
.month-days{display:grid;grid-template-columns:repeat(7,1fr);padding:0 var(--s2) var(--s3);gap:2px}
.cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:50%;font-size:13px;font-weight:400;color:var(--label-2);cursor:pointer;transition:all var(--tf);-webkit-tap-highlight-color:transparent}
.cal-day.empty,.cal-day.future{cursor:default}
.cal-day.today{font-weight:700;color:var(--label)}
.cal-day.done{color:#fff}
.cal-day.missed{opacity:.3}
.cal-day.future{opacity:.2}
.week-grid{background:var(--bg-2);border-radius:var(--r-lg);border:.5px solid var(--sep-o);padding:var(--s4);display:grid;grid-template-columns:repeat(7,1fr);gap:var(--s1);box-shadow:0 1px 8px rgba(0,0,0,.3)}
.wk-day{display:flex;flex-direction:column;align-items:center;gap:var(--s1);cursor:pointer;-webkit-tap-highlight-color:transparent}
.wk-dl{font-size:10px;font-weight:600;color:var(--label-3);text-transform:uppercase}
.wk-circle{width:34px;height:34px;border-radius:50%;border:1.5px solid var(--sep);display:flex;align-items:center;justify-content:center;color:transparent;transition:all var(--tf)}
.wk-day.done .wk-circle{color:#fff;border-color:transparent}
.wk-day.today .wk-num{font-weight:700;color:var(--label)}
.wk-num{font-size:12px;color:var(--label-2)}
.day-view{background:var(--bg-2);border-radius:var(--r-lg);border:.5px solid var(--sep-o);padding:var(--s6);display:flex;flex-direction:column;align-items:center;gap:var(--s4);box-shadow:0 1px 8px rgba(0,0,0,.3)}
.day-circle{width:100px;height:100px;border-radius:50%;border:2px solid var(--sep);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .28s cubic-bezier(.34,1.56,.64,1);color:var(--label-3);-webkit-tap-highlight-color:transparent}
.day-circle.done{border-color:transparent;color:#fff}
.day-label{font-size:16px;font-weight:600;text-align:center}
.day-status{font-size:14px;color:var(--label-3);text-align:center}
.year-heatmap{background:var(--bg-2);border-radius:var(--r-lg);border:.5px solid var(--sep-o);padding:var(--s4);overflow-x:auto;-webkit-overflow-scrolling:touch;box-shadow:0 1px 8px rgba(0,0,0,.3)}
.heatmap-grid{display:grid;grid-template-rows:repeat(7,1fr);grid-auto-flow:column;gap:3px;width:max-content}
.heat-cell{width:11px;height:11px;border-radius:2px;transition:all var(--tf)}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--s2);margin-top:var(--s4)}
.stat-card{background:var(--bg-2);border-radius:var(--r-md);border:.5px solid var(--sep-o);padding:var(--s3) var(--s2);text-align:center;box-shadow:0 1px 6px rgba(0,0,0,.2)}
.stat-val{font-size:22px;font-weight:700;letter-spacing:-.5px;line-height:1.1}
.stat-lbl{font-size:11px;color:var(--label-3);margin-top:3px;font-weight:500;text-transform:uppercase;letter-spacing:.04em}

/* ── Settings (HIG inset grouped) ── */
.settings-section{margin-bottom:var(--s5)}
.settings-lbl{font-size:13px;font-weight:600;color:var(--label-2);text-transform:uppercase;letter-spacing:.05em;padding:0 var(--s4);margin-bottom:var(--s2)}
.ig-list{background:var(--bg-2);border-radius:var(--r-lg);overflow:hidden;border:.5px solid var(--sep-o);box-shadow:0 1px 6px rgba(0,0,0,.25)}
.ig-row{display:flex;align-items:center;gap:var(--s3);padding:12px var(--s4);border-bottom:.5px solid var(--sep-o);-webkit-tap-highlight-color:transparent;transition:background var(--tf);min-height:44px}
.ig-row:last-child{border-bottom:none}
.ig-row:active{background:var(--fill-4)}
.ig-icon{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#fff}
.ig-body{flex:1;min-width:0}
.ig-label{font-size:16px;font-weight:400}
.ig-value{font-size:13px;color:var(--label-3);margin-top:1px}
.s-btn{padding:7px 14px;border-radius:var(--r-pill);border:none;font-size:14px;font-weight:600;cursor:pointer;transition:opacity var(--tf);-webkit-tap-highlight-color:transparent;flex-shrink:0}
.s-btn:active{opacity:.7}
.s-btn-t{background:var(--tint);color:#fff}
.s-btn-f{background:var(--fill-2);color:var(--label)}
.s-btn-r{background:rgba(255,69,58,.15);color:var(--red)}

/* ── Sheet ── */
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;opacity:0;pointer-events:none;transition:opacity var(--tb);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
#overlay.visible{opacity:1;pointer-events:all}
#habit-sheet{position:fixed;left:0;right:0;bottom:0;background:var(--bg-2);border-radius:28px 28px 0 0;z-index:201;padding:var(--s5) var(--s4) calc(var(--s5) + env(safe-area-inset-bottom));transform:translateY(110%);transition:transform .38s cubic-bezier(.32,.72,0,1);max-height:90vh;overflow-y:auto;-webkit-overflow-scrolling:touch;box-shadow:0 -12px 60px rgba(0,0,0,.7)}
#habit-sheet.open{transform:translateY(0)}
.sheet-pull{width:36px;height:4px;background:var(--fill);border-radius:2px;margin:0 auto var(--s5)}
.sheet-hdr{font-size:20px;font-weight:700;letter-spacing:-.3px;margin-bottom:var(--s5)}
.form-lbl{font-size:12px;font-weight:600;color:var(--label-2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:var(--s2);display:block}
.form-field{width:100%;background:var(--fill-3);border:none;border-radius:var(--r-md);color:var(--label);padding:13px var(--s4);outline:none;transition:all var(--tf)}
.form-field:focus{background:var(--fill-2);box-shadow:0 0 0 3px rgba(255,159,10,.25)}
.form-grp{margin-bottom:var(--s4)}
.icon-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:var(--s2);background:var(--fill-3);border-radius:var(--r-md);padding:var(--s3)}
.icon-pick{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:var(--r-sm);border:2px solid transparent;background:none;cursor:pointer;transition:all var(--tf);-webkit-tap-highlight-color:transparent;color:var(--label-2)}
.icon-pick:active{background:var(--fill-2)}
.icon-pick.sel{border-color:var(--tint);background:rgba(255,159,10,.15);color:var(--tint)}
.color-row{display:flex;gap:var(--s3);flex-wrap:wrap}
.color-sw{width:30px;height:30px;border-radius:50%;border:3px solid transparent;cursor:pointer;transition:all var(--tf);-webkit-tap-highlight-color:transparent}
.color-sw.sel{border-color:#fff;transform:scale(1.2)}
.sheet-actions{display:flex;gap:var(--s2);margin-top:var(--s5)}
.btn-cancel{flex:1;padding:14px;background:var(--fill-3);border:none;border-radius:var(--r-md);color:var(--label);font-size:16px;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent}
.btn-save{flex:2;padding:14px;background:var(--tint);border:none;border-radius:var(--r-md);color:#fff;font-size:16px;font-weight:600;cursor:pointer;box-shadow:0 4px 16px rgba(255,159,10,.38);transition:opacity var(--tf);-webkit-tap-highlight-color:transparent}
.btn-save:active{opacity:.82}

/* ── Toast ── */
#toast{position:fixed;top:calc(var(--s5) + env(safe-area-inset-top));left:50%;transform:translateX(-50%) translateY(-70px);background:rgba(44,44,46,.96);color:var(--label);padding:10px var(--s5);border-radius:var(--r-pill);font-size:14px;font-weight:500;z-index:999;transition:transform .28s ease;white-space:nowrap;border:.5px solid var(--sep-o);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);box-shadow:0 4px 20px rgba(0,0,0,.5)}
#toast.show{transform:translateX(-50%) translateY(0)}

/* ── Empty state ── */
.empty{text-align:center;padding:var(--s7) var(--s4);display:flex;flex-direction:column;align-items:center;gap:var(--s3)}
.empty-icon{color:var(--fill);margin-bottom:var(--s1)}
.empty h3{font-size:18px;font-weight:600;color:var(--label-2)}
.empty p{font-size:14px;color:var(--label-3)}

/* Misc */
.section-title{font-size:22px;font-weight:700;letter-spacing:-.4px;margin-bottom:var(--s4)}
</style>
</head>
<body>

<!-- Login -->
<div id="login-overlay">
  <div class="login-card">
    <div class="login-mark">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <h1>The Habits Tracker</h1>
    <p>Your daily habits, beautifully tracked.</p>
    <input type="text" id="name-input" class="login-field" placeholder="Your name" maxlength="30" autocomplete="off" autocorrect="off">
    <button class="btn-cta" onclick="loginUser()">Get Started</button>
  </div>
</div>

<!-- App -->
<div id="app" style="display:none">
  <div id="app-layout">
    <!-- Sidebar (desktop) -->
    <nav id="sidebar">
      <div class="sb-top">
        <div class="sb-mark">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <div class="sb-title">Habits</div>
      </div>
      <div class="sb-nav">
        <button class="sb-btn active" id="sb-today" onclick="navigate('today')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
          Today

function dateStr(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function uid(){return'h_'+Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function fmtTime(t){if(!t)return'All day';const[hh,mm]=t.split(':').map(Number);return`${hh%12||12}:${String(mm).padStart(2,'0')} ${hh>=12?'PM':'AM'}`}
function fmtDate(d,opts){return d.toLocaleDateString('en-US',opts)}

function calcStreak(comp){
  let s=0;const today=dateStr(new Date());const d=new Date();
  if(!comp[today])d.setDate(d.getDate()-1);
  while(true){const k=dateStr(d);if(!comp[k])break;s++;d.setDate(d.getDate()-1);}
  return s;
}
function longestStreak(comp){
  const keys=Object.keys(comp).filter(k=>comp[k]).sort();
  if(!keys.length)return 0;
  let best=1,cur=1;
  for(let i=1;i<keys.length;i++){const diff=(new Date(keys[i])-new Date(keys[i-1]))/864e5;if(diff===1){cur++;best=Math.max(best,cur);}else cur=1;}
  return best;
}
function compRate(comp,keys){if(!keys.length)return 0;return Math.round(keys.filter(k=>comp[k]).length/keys.length*100)}
function getWeekStart(d){const s=new Date(d);const day=s.getDay();s.setDate(s.getDate()-day+(day===0?-6:1));return s}
function daysInMonth(y,m){return new Date(y,m+1,0).getDate()}
function firstDayOfMonth(y,m){return new Date(y,m,1).getDay()}

        if(data){this._user={name:data.display_name};this._data=data.app_data||{habits:[]};}
        else{this._user={name:name.trim()};this._data={habits:[]};await this._db.from(TABLE).insert({username:key,display_name:name.trim(),app_data:this._data});}
        this._wCache();
      }catch(e){this._user={name:name.trim()};this._data={habits:[]};this._wCache();}
    }else{const c=localStorage.getItem(this._lk('u'));if(c)this._rCache();else{this._user={name:name.trim()};this._data={habits:[]};this._wCache();}}
  },
  async save(){
    this._wCache();
    if(this._db&&this._username){try{await this._db.from(TABLE).update({app_data:this._data}).eq('username',this._username);}catch(e){}}
  },
  logout(){localStorage.removeItem(this._KEY);this._username=null;this._user={name:null};this._data={habits:[]};},
  get habits(){return this._data.habits||[]},
  get userName(){return this._user?.name||null}
};

// ── State ──
let page='today',calHid=null,calPeriod='month',calDate=new Date();
let editId=null,shIcon=HABIT_ICONS[0],shColor=COLORS[0],shAllDay=false;

// ── Navigation ──
function navigate(p){
  page=p;
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  ['today','habits','calendar','settings'].forEach(n=>{
    document.getElementById('sb-'+n)?.classList.toggle('active',n===p);
    document.getElementById('bn-'+n)?.classList.toggle('active',n===p);
  });
  document.getElementById('fab').style.display=(p==='today'||p==='habits')?'flex':'none';
  renderPage(p);
}
function renderPage(p){
  if(p==='today')renderToday();
  else if(p==='habits')renderHabits();
  else if(p==='calendar')renderCalendar();
  else if(p==='settings')renderSettings();
}

// ── Today ──
function renderToday(){
  const habits=Store.habits,today=dateStr(new Date()),now=new Date();
  const hr=now.getHours();

  const first=Store.userName?.split(' ')[0]||'';
  const done=habits.filter(h=>h.completions[today]).length,total=habits.length;
  const pct=total?done/total:0,r=36,c=2*Math.PI*r;

  let html=`<div class="ph"><div class="ph-title">${greet}${first?', '+first:''}</div><div class="ph-sub">${fmtDate(new Date(),{weekday:'long',month:'long',day:'numeric'})}</div></div>`;

  if(total){
    const ringColor=pct===1?'var(--green)':'var(--tint)';
    html+=`<div class="progress-card">
      <svg width="80" height="80" viewBox="0 0 84 84" style="flex-shrink:0">
        <circle cx="42" cy="42" r="${r}" fill="none" stroke="var(--fill-3)" stroke-width="7"/>
        <circle cx="42" cy="42" r="${r}" fill="none" stroke="${ringColor}" stroke-width="7"
          stroke-dasharray="${c}" stroke-dashoffset="${c*(1-pct)}" stroke-linecap="round"
          transform="rotate(-90 42 42)" style="transition:stroke-dashoffset .5s ease;filter:drop-shadow(0 0 6px ${ringColor}66)"/>
        <text x="42" y="42" text-anchor="middle" dominant-baseline="middle" fill="white" font-size="14" font-weight="700" font-family="-apple-system,sans-serif">${done}/${total}</text>
      </svg>

        <div class="prog-count">${done}<span style="font-size:18px;font-weight:500;color:var(--label-2)">/${total}</span></div>
        <div class="prog-label">${done===total&&total>0?'🎉 All done!':'habits completed'}</div>
      </div>
    </div>`;
  }

  html+=`<div class="habits-list">`;
  if(!habits.length){
    html+=`<div class="empty"><div class="empty-icon">${ic('target',48)}</div><h3>No habits yet</h3><p>Tap + to add your first habit</p></div>`;
  } else {
    habits.forEach(h=>{
      const isDone=!!h.completions[today],streak=calcStreak(h.completions);
      const iconBg=isDone?h.color:`rgba(118,118,128,.22)`;
      const iconColor=isDone?'#fff':'var(--label-2)';
      html+=`<div class="habit-card${isDone?' done':''}" onclick="toggleToday('${h.id}')"
        style="${isDone?`background:linear-gradient(135deg,${h.color}12,${h.color}06);border-color:${h.color}35;box-shadow:0 4px 20px ${h.color}22,0 1px 6px rgba(0,0,0,.3)`:``}">
        <div class="h-icon" style="background:${iconBg};color:${iconColor}">${ic(h.emoji,22)}</div>
        <div class="h-info">
          <div class="h-name">${h.name}</div>
          <div class="h-meta">${h.reminderTime?'⏰ '+fmtTime(h.reminderTime):'All day'}</div>
        </div>
        ${streak>0?`<div class="streak-pill">${ic('flame',12)} ${streak}</div>`:''}
        <div class="check-ring" style="${isDone?`background:${h.color};border-color:${h.color}`:''}">
          ${isDone?`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`:''}
        </div>
      </div>`;
    });
  }
  html+=`</div>`;
  document.getElementById('page-today').innerHTML=html;

async function toggleToday(id){
  const today=dateStr(new Date());
  const h=Store.habits.find(x=>x.id===id);
  if(!h)return;
  if(h.completions[today])delete h.completions[today];else h.completions[today]=true;
  await Store.save();
  renderToday();
  // Keep calendar in sync if navigated there
  if(page==='calendar')renderCalendar();
}

async function deleteHabit(id){
  if(!confirm('Delete this habit? All data will be lost.'))return;
  Store._data.habits=Store.habits.filter(h=>h.id!==id);

// ── Calendar ──
function renderCalendar(){
  const habits=Store.habits;
  if(!calHid&&habits.length)calHid='__all__';

  const h=isAll?null:habits.find(x=>x.id===calHid);

  }

  // Habit pills — "All" first, then each habit

  habits.forEach(x=>{const a=x.id===calHid;html+=`<button class="h-pill${a?' active':''}" style="${a?`background:${x.color};border-color:${x.color}`:''}" onclick="calSelHabit('${x.id}')">${ic(x.emoji,14)} ${x.name}</button>`;});
  html+=`</div>`;

  // Period toggle
  html+=`<div class="period-seg">`;
  ['day','week','month','year'].forEach(p=>{html+=`<button class="period-btn${calPeriod===p?' active':''}" onclick="setCalPeriod('${p}')">${p[0].toUpperCase()+p.slice(1)}</button>`;});
  html+=`</div>`;

  // Nav
  html+=`<div class="cal-nav">
    <button class="cal-arrow" onclick="calNav(-1)"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>

    else html+=renderAllYearView(habits);

  } else if(h){

    else if(calPeriod==='month')html+=renderMonthView(h);
    else html+=renderYearView(h);

  }
  document.getElementById('page-calendar').innerHTML=html;

function calNavLabel(){
  if(calPeriod==='day')return fmtDate(calDate,{weekday:'long',month:'short',day:'numeric'});
  if(calPeriod==='week'){const s=getWeekStart(calDate),e=new Date(s);e.setDate(e.getDate()+6);return`${fmtDate(s,{month:'short',day:'numeric'})} – ${fmtDate(e,{month:'short',day:'numeric',year:'numeric'})}`;}
  if(calPeriod==='month')return fmtDate(calDate,{month:'long',year:'numeric'});
  return calDate.getFullYear().toString();
}
function calNav(dir){
  const d=calDate;
  if(calPeriod==='day')d.setDate(d.getDate()+dir);
  else if(calPeriod==='week')d.setDate(d.getDate()+dir*7);
  else if(calPeriod==='month')d.setMonth(d.getMonth()+dir);
  else d.setFullYear(d.getFullYear()+dir);
  renderCalendar();
}
function calSelHabit(id){calHid=id;renderCalendar();}
function setCalPeriod(p){calPeriod=p;renderCalendar();}

function renderDayView(h){

    <div class="day-circle${isDone?' done':''}"

function renderWeekView(h){
  const s=getWeekStart(calDate),today=dateStr(new Date());

        ${isDone?`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`:''}
      </div>

function renderMonthView(h){
  const y=calDate.getFullYear(),m=calDate.getMonth(),days=daysInMonth(y,m),first=firstDayOfMonth(y,m);
  const today=dateStr(new Date());
  let html=`<div class="month-grid"><div class="month-wdays">${['Su','Mo','Tu','We','Th','Fr','Sa'].map(d=>`<div class="wday">${d}</div>`).join('')}</div><div class="month-days">`;
  for(let i=0;i<first;i++)html+=`<div class="cal-day empty"></div>`;
  for(let day=1;day<=days;day++){
    const d=new Date(y,m,day),k=dateStr(d),isDone=!!h.completions[k],isToday=k===today,isFuture=k>today;
    let cls='cal-day';
    if(isDone)cls+=' done';else if(isFuture)cls+=' future';else if(k<today)cls+=' missed';
    if(isToday)cls+=' today';
    html+=`<div class="${cls}"
      style="${isDone?`background:${h.color};box-shadow:0 2px 6px ${h.color}44`:isToday?`box-shadow:0 0 0 1.5px ${h.color}`:''}"

function renderYearView(h){
  const y=calDate.getFullYear(),today=dateStr(new Date());

  for(let i=0;i<start.getDay();i++)html+=`<div class="heat-cell" style="background:transparent"></div>`;
  const d=new Date(start);
  while(d.getFullYear()===y){
    const k=dateStr(d),done=!!h.completions[k],isFuture=k>today;
    html+=`<div class="heat-cell" title="${k}${done?' ✓':''}"
      style="background:${done?h.color:isFuture?'transparent':'var(--fill-3)'};opacity:${done?1:isFuture?0:.6}"
      onclick="${!isFuture?`toggleCalDay('${h.id}','${k}')`:''}" style="cursor:${isFuture?'default':'pointer'}"></div>`;
    d.setDate(d.getDate()+1);

  return html+`</div></div>`;
}

function renderStats(h){
  const streak=calcStreak(h.completions),best=longestStreak(h.completions);
  let keys=[];const today=dateStr(new Date());
  if(calPeriod==='day')keys=[dateStr(calDate)];
  else if(calPeriod==='week'){const s=getWeekStart(calDate);for(let i=0;i<7;i++){const d=new Date(s);d.setDate(d.getDate()+i);keys.push(dateStr(d));}}
  else if(calPeriod==='month'){const y=calDate.getFullYear(),m=calDate.getMonth(),n=daysInMonth(y,m);for(let i=1;i<=n;i++)keys.push(dateStr(new Date(y,m,i)));}
  else{const d=new Date(calDate.getFullYear(),0,1);while(d.getFullYear()===calDate.getFullYear()){keys.push(dateStr(d));d.setDate(d.getDate()+1);}}
  const rate=compRate(h.completions,keys.filter(k=>k<=today));
  return`<div class="stats-row">

  </div>`;

function renderAllWeekView(habits){
  const s=getWeekStart(calDate),today=dateStr(new Date()),n=habits.length;

  let html=`<div class="week-grid">`;

        ${all?`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`:partial?`<span style="font-size:10px;font-weight:700;color:var(--tint)">${done}</span>`:''}
      </div>
      <div class="wk-num">${d.getDate()}</div>

function renderAllMonthView(habits){
  const y=calDate.getFullYear(),m=calDate.getMonth(),days=daysInMonth(y,m),first=firstDayOfMonth(y,m);
  const today=dateStr(new Date()),n=habits.length;
  let html=`<div class="month-grid"><div class="month-wdays">${['Su','Mo','Tu','We','Th','Fr','Sa'].map(d=>`<div class="wday">${d}</div>`).join('')}</div><div class="month-days">`;
  for(let i=0;i<first;i++)html+=`<div class="cal-day empty"></div>`;
  for(let day=1;day<=days;day++){
    const d=new Date(y,m,day),k=dateStr(d),done=allDoneCount(habits,k),isToday=k===today,isFuture=k>today;
    const all=done===n&&n>0,partial=done>0&&!all;
    let cls='cal-day';if(isFuture)cls+=' future';if(isToday)cls+=' today';if(all)cls+=' done';
    html+=`<div class="${cls}" style="${all?`background:var(--tint);box-shadow:0 2px 6px rgba(255,159,10,.4)`:partial?`box-shadow:0 0 0 1.5px var(--tint)`:isToday?`box-shadow:0 0 0 1.5px var(--tint)`:''}" title="${k}: ${done}/${n}">
      ${all?`<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`:day}
    </div>`;

function renderAllYearView(habits){
  const y=calDate.getFullYear(),today=dateStr(new Date()),n=habits.length;
  let html=`<div class="year-heatmap"><div class="heatmap-grid">`;
  const start=new Date(y,0,1);
  for(let i=0;i<start.getDay();i++)html+=`<div class="heat-cell" style="background:transparent"></div>`;
  const d=new Date(start);
  while(d.getFullYear()===y){
    const k=dateStr(d),done=allDoneCount(habits,k),isFuture=k>today;
    const intensity=n>0?done/n:0;
    const alpha=isFuture?0:intensity>0?(.2+intensity*.8):.15;
    const bg=intensity>0?`rgba(255,159,10,${alpha})`:isFuture?'transparent':`var(--fill-3)`;
    html+=`<div class="heat-cell" title="${k}: ${done}/${n}" style="background:${bg}"></div>`;
    d.setDate(d.getDate()+1);

  return html+`</div></div>`;

function renderAllStats(habits){
  const today=dateStr(new Date()),n=habits.length;
  if(!n)return'';
  let keys=[];
  if(calPeriod==='day')keys=[dateStr(calDate)];
  else if(calPeriod==='week'){const s=getWeekStart(calDate);for(let i=0;i<7;i++){const d=new Date(s);d.setDate(d.getDate()+i);keys.push(dateStr(d));}}
  else if(calPeriod==='month'){const y=calDate.getFullYear(),m=calDate.getMonth(),nd=daysInMonth(y,m);for(let i=1;i<=nd;i++)keys.push(dateStr(new Date(y,m,i)));}
  else{const d=new Date(calDate.getFullYear(),0,1);while(d.getFullYear()===calDate.getFullYear()){keys.push(dateStr(d));d.setDate(d.getDate()+1);}}
  const pastKeys=keys.filter(k=>k<=today);
  const totalSlots=pastKeys.length*n;
  const totalDone=pastKeys.reduce((acc,k)=>acc+allDoneCount(habits,k),0);
  const rate=totalSlots?Math.round(totalDone/totalSlots*100):0;
  const perfectDays=pastKeys.filter(k=>allDoneCount(habits,k)===n).length;
  return`<div class="stats-row">
    <div class="stat-card"><div class="stat-val" style="color:var(--tint)">${n}</div><div class="stat-lbl">${ic('activity',12)} Habits</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--yellow)">${perfectDays}</div><div class="stat-lbl">${ic('trophy',12)} Perfect</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--green)">${rate}%</div><div class="stat-lbl">${ic('target',12)} Rate</div></div>
  </div>`;
}

async function toggleCalDay(habitId,key){
  const today=dateStr(new Date());if(key>today)return;
  const h=Store.habits.find(x=>x.id===habitId);if(!h)return;
  if(h.completions[key])delete h.completions[key];else h.completions[key]=true;
  await Store.save();renderCalendar();
  if(page==='today')renderToday();
}

// ── Settings ──

  const sl=np==='granted'?'Enabled':np==='denied'?'Blocked in Settings':'Not enabled';
  const sc=np==='granted'?'var(--green)':np==='denied'?'var(--red)':'var(--label-3)';
  document.getElementById('page-settings').innerHTML=`
    <div class="ph"><div class="ph-title">Settings</div></div>

    <div class="settings-section">
      <div class="settings-lbl">Account</div>
      <div class="ig-list">
        <div class="ig-row">
          <div class="ig-icon" style="background:var(--tint)">${ic('sun',16)}</div>
          <div class="ig-body"><div class="ig-label">${Store.userName||'—'}</div><div class="ig-value">Display name</div></div>
          <button class="s-btn s-btn-f" onclick="changeName()">Change</button>
        </div>
      </div>
    </div>

    <div class="settings-section">
      <div class="settings-lbl">Notifications</div>
      <div class="ig-list">
        <div class="ig-row">
          <div class="ig-icon" style="background:#ff375f">${ic('bell',16)}</div>
          <div class="ig-body"><div class="ig-label">Reminders</div><div class="ig-value" style="color:${sc}">${sl}</div></div>
          ${np!=='granted'?`<button class="s-btn s-btn-t" onclick="enableNotifs()">Enable</button>`:`<button class="s-btn s-btn-f" onclick="testNotif()">Test</button>`}
        </div>
        ${np==='default'?`<div class="ig-row" style="cursor:default"><div class="ig-body"><div class="ig-value" style="font-size:13px">Requires iOS 16.4+ with app added to Home Screen. Set reminder times per habit.</div></div></div>`:''}
        ${np==='denied'?`<div class="ig-row" style="cursor:default"><div class="ig-body"><div class="ig-value" style="font-size:13px">Go to iPhone Settings → Safari → Notifications to re-enable.</div></div></div>`:''}
      </div>
    </div>

    <div class="settings-section">
      <div class="settings-lbl">Data</div>
      <div class="ig-list">
        <div class="ig-row">
          <div class="ig-icon" style="background:var(--teal)">${ic('activity',16)}</div>
          <div class="ig-body"><div class="ig-label">Habits tracked</div><div class="ig-value">${Store.habits.length} habit${Store.habits.length!==1?'s':''}</div></div>
        </div>
        <div class="ig-row">
          <div class="ig-icon" style="background:var(--green)">${ic('leaf',16)}</div>
          <div class="ig-body"><div class="ig-label">Cloud sync</div><div class="ig-value">Supabase · Automatic</div></div>
          <button class="s-btn s-btn-f" onclick="syncNow()">Sync</button>
        </div>
        <div class="ig-row">
          <div class="ig-icon" style="background:var(--bg-4)">${ic('refresh',16)}</div>
          <div class="ig-body"><div class="ig-label">App updates</div><div class="ig-value" id="update-status">Check for latest version</div></div>
          <button class="s-btn s-btn-f" id="update-btn" onclick="checkForUpdates()">Update</button>
        </div>
      </div>
    </div>

    <div class="settings-section">
      <div class="ig-list">
        <div class="ig-row">
          <div class="ig-body"><div class="ig-label" style="color:var(--red)">Sign Out</div></div>
          <button class="s-btn s-btn-r" onclick="logout()">Sign Out</button>
        </div>
      </div>
    </div>`;
}

function changeName(){const n=prompt('Enter new name:',Store.userName||'');if(n&&n.trim()){Store._user.name=n.trim();Store.save();renderSettings();showToast('Name updated');}}
async function syncNow(){await Store.save();showToast('✓ Synced to cloud');}

async function checkForUpdates(){
  const btn=document.getElementById('update-btn');
  const status=document.getElementById('update-status');
  if(!navigator.serviceWorker){showToast('Updates not available');return;}
  if(btn){btn.disabled=true;btn.textContent='Checking…';}
  if(status)status.textContent='Checking for updates…';

  try{
    const reg=await navigator.serviceWorker.getRegistration();
    if(!reg){showToast('No update worker found');reset();return;}

    const applyUpdate=sw=>{
      navigator.serviceWorker.addEventListener('controllerchange',()=>location.reload(),{once:true});
      sw.postMessage({type:'SKIP_WAITING'});
      if(status)status.textContent='Applying update…';
    };

    if(reg.waiting){applyUpdate(reg.waiting);return;}

    await reg.update();

    if(reg.waiting){applyUpdate(reg.waiting);return;}

    reg.addEventListener('updatefound',()=>{
      const sw=reg.installing;
      sw.addEventListener('statechange',()=>{
        if(sw.state==='installed'&&navigator.serviceWorker.controller)applyUpdate(sw);
      },{once:true});
    },{once:true});

    // If no new SW found within 2s → already up to date
    setTimeout(()=>{
      if(!reg.waiting&&!reg.installing){
        showToast('Already up to date');
        if(status)status.textContent='Already up to date';
        reset();
      }
    },2000);
  }catch(e){showToast('Update check failed');reset();}

  function reset(){if(btn){btn.disabled=false;btn.textContent='Update';}}
}

function logout(){if(!confirm('Sign out? Your data is safely saved.'))return;Store.logout();document.getElementById('app').style.display='none';document.getElementById('login-overlay').style.display='flex';document.getElementById('name-input').value='';}

// ── Notifications ──
async function enableNotifs(){
  if(!('Notification' in window)){showToast('Notifications not supported');return;}
  const p=await Notification.requestPermission();
  showToast(p==='granted'?'✓ Reminders enabled!':'Notifications blocked');
  if(p==='granted')scheduleReminders();renderSettings();
}
function testNotif(){navigator.serviceWorker.ready.then(r=>r.showNotification('The Habits Tracker',{body:'Reminders are working!',icon:'./apple-touch-icon.png'}));showToast('Test sent!');}
function scheduleReminders(){
  if(Notification.permission!=='granted')return;
  const reminders=Store.habits.filter(h=>h.reminderTime).map(h=>({id:h.id,name:h.name,icon:h.emoji,time:h.reminderTime}));
  if(!reminders.length)return;
  if(navigator.serviceWorker.controller){
    navigator.serviceWorker.controller.postMessage({type:'SCHEDULE_REMINDERS',reminders});
  } else {
    navigator.serviceWorker.ready.then(reg=>{
      if(reg.active)reg.active.postMessage({type:'SCHEDULE_REMINDERS',reminders});
    });
  }
}

// ── Sheet ──
function setAllDay(on){
  shAllDay=on;
  const tog=document.getElementById('allday-toggle');
  const knob=document.getElementById('allday-knob');
  const inp=document.getElementById('habit-reminder');
  if(!tog)return;
  tog.style.background=on?'var(--tint)':'var(--fill-3)';
  knob.style.transform=on?'translateX(18px)':'translateX(0)';
  inp.style.opacity=on?'.35':'1';
  inp.disabled=on;
}
function toggleAllDay(){setAllDay(!shAllDay);}

function buildIconGrid(){
  document.getElementById('icon-grid').innerHTML=HABIT_ICONS.map(n=>`<button class="icon-pick${n===shIcon?' sel':''}" onclick="selIcon('${n}')" title="${n}">${ic(n,20)}</button>`).join('');
}
function buildColorRow(){
  document.getElementById('color-row').innerHTML=COLORS.map(c=>`<div class="color-sw${c===shColor?' sel':''}" style="background:${c};box-shadow:${c===shColor?`0 0 0 3px rgba(255,255,255,.3)`:``}" onclick="selColor('${c}')"></div>`).join('');
}
function selIcon(n){shIcon=n;buildIconGrid();}
function selColor(c){shColor=c;buildColorRow();}

function openSheet(habitId=null){
  editId=habitId;
  if(habitId){
    const h=Store.habits.find(x=>x.id===habitId);if(!h)return;
    document.getElementById('sheet-title').textContent='Edit Habit';
    document.getElementById('habit-name').value=h.name;
    shIcon=h.emoji;shColor=h.color;
    const hasTime=!!h.reminderTime;
    document.getElementById('habit-reminder').value=hasTime?h.reminderTime:'09:00';
    setTimeout(()=>setAllDay(!hasTime),50);
  } else {
    document.getElementById('sheet-title').textContent='New Habit';
    document.getElementById('habit-name').value='';
    document.getElementById('habit-reminder').value='09:00';
    shIcon=HABIT_ICONS[Math.floor(Math.random()*HABIT_ICONS.length)];
    shColor=COLORS[Store.habits.length%COLORS.length];
    setTimeout(()=>setAllDay(false),50);
  }
  buildIconGrid();buildColorRow();
  document.getElementById('habit-sheet').classList.add('open');
  document.getElementById('overlay').classList.add('visible');
  setTimeout(()=>document.getElementById('habit-name').focus(),380);
}
function closeSheet(){document.getElementById('habit-sheet').classList.remove('open');document.getElementById('overlay').classList.remove('visible');}
async function saveHabit(){
  const name=document.getElementById('habit-name').value.trim();
  if(!name){showToast('Please enter a name');return;}
  const reminder=shAllDay?null:document.getElementById('habit-reminder').value;
  if(editId){const h=Store.habits.find(x=>x.id===editId);if(h){h.name=name;h.emoji=shIcon;h.color=shColor;h.reminderTime=reminder;}}
  else{Store.habits.push({id:uid(),name,emoji:shIcon,color:shColor,reminderTime:reminder,completions:{}});}
  await Store.save();scheduleReminders();closeSheet();renderPage(page);
  showToast(editId?'Habit updated':'Habit added ✓');
}

// ── Login ──
async function loginUser(){
  const name=document.getElementById('name-input').value.trim();
  if(!name){showToast('Please enter your name');return;}
  await Store.setUser(name);
  document.getElementById('login-overlay').style.display='none';
  document.getElementById('app').style.display='flex';
  navigate('today');
  if(Notification.permission==='granted')scheduleReminders();
}

// ── Init ──
async function init(){
  if('serviceWorker' in navigator){
    try{
      const reg=await navigator.serviceWorker.register('./sw.js');
      // Schedule reminders as soon as SW is ready (even before user interacts)
      reg.addEventListener('activate',()=>{if(Notification.permission==='granted')scheduleReminders();});
    }catch(e){}
  }
  await Store.init();
  if(Store.userName){
    document.getElementById('login-overlay').style.display='none';
    document.getElementById('app').style.display='flex';
    navigate('today');
    if(Notification.permission==='granted')scheduleReminders();
  }
  document.getElementById('name-input').addEventListener('keydown',e=>{if(e.key==='Enter')loginUser();});
}
init();
</script>
